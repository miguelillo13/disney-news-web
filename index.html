<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Disney News Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.10.1/dist/supabase.min.js"></script>
  
  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background-color: #f0f4f8;
      color: #333;
    }

    header {
      background-color: #012169;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 36px;
    }

    nav {
      display: flex;
      justify-content: center;
      background-color: #013a63;
    }

    nav button {
      background: none;
      border: none;
      color: white;
      padding: 15px 25px;
      cursor: pointer;
      font-size: 16px;
    }

    nav button:hover {
      background-color: #014a87;
    }

    .search-bar {
      margin: 20px auto;
      max-width: 600px;
      text-align: center;
    }

    .search-bar input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .content {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .card {
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 15px;
      position: relative;
    }

    .card h3 {
      margin-top: 0;
      color: #012169;
    }

    .secret-panel {
      background-color: #ffe600;
      padding: 20px;
      border-radius: 12px;
      margin: 20px auto;
      max-width: 600px;
      display: none;
    }

    .secret-panel input, .secret-panel textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .secret-panel button {
      background-color: #012169;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
    }

    .secret-btn {
      display: none;
      background-color: #ff3b3b;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      position: absolute;
      top: 10px;
      right: 10px;
    }

    .show-secret .secret-btn {
      display: inline-block;
    }

    footer {
      text-align: center;
      padding: 20px;
      background-color: #012169;
      color: white;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <header>
    <h1 id="logo">Disney News Web</h1>
  </header>

  <nav>
    <button onclick="scrollToContent()">Inicio</button>
  </nav>

  <div class="search-bar">
    <input type="text" id="search" placeholder="Buscar contenido..." onkeyup="filterCards()">
  </div>

  <div class="secret-panel" id="secretPanel">
    <input type="password" id="secretPassword" placeholder="Contraseña">
    <button onclick="unlockSecret()">Desbloquear</button>

    <div id="addContent" style="display:none; margin-top:15px;">
      <input type="text" id="newTitle" placeholder="Título">
      <textarea id="newContent" placeholder="Contenido"></textarea>
      <button onclick="addPost()">Agregar Contenido</button>
    </div>
  </div>

  <div class="content" id="content"></div>

  <footer>
    © 2026 Disney News Web
  </footer>

  <script>
    // Supabase
    const SUPABASE_URL = 'https://ywqmctncfgkfjtucbqgp.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_mlwJj-1Oz6wU61O1fQ6DCw_armvjEiX';
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const SECRET_KEY = 'mickey123'; // Contraseña zona secreta

    // Zona secreta discreta: clic 5 veces en el logo
    let clickCount = 0;
    document.getElementById('logo').addEventListener('click', () => {
      clickCount++;
      if(clickCount >= 5) {
        document.getElementById('secretPanel').style.display = 'block';
        clickCount = 0;
      }
    });

    // Desbloquear panel secreto
    function unlockSecret() {
      const password = document.getElementById('secretPassword').value;
      if(password === SECRET_KEY) {
        document.getElementById('addContent').style.display = 'block';
        document.body.classList.add('show-secret');
        alert('Zona secreta desbloqueada!');
      } else {
        alert('Contraseña incorrecta');
      }
    }

    // Cargar publicaciones
    async function loadPosts() {
      const { data, error } = await supabase
        .from('posts')
        .select('*')
        .order('created_at', { ascending: false });

      const container = document.getElementById('content');
      container.innerHTML = '';

      data.forEach(post => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<h3>${post.title}</h3><p>${post.content}</p>
          <button onclick="deletePost(${post.id})" class="secret-btn">Eliminar</button>`;
        container.appendChild(card);
      });
    }

    // Agregar publicación
    async function addPost() {
      const title = document.getElementById('newTitle').value;
      const content = document.getElementById('newContent').value;
      if(!title || !content) return alert('Completa todos los campos');

      const { data, error } = await supabase.from('posts').insert([{ title, content }]);
      if(error) return alert('Error al guardar: ' + error.message);

      loadPosts();
      document.getElementById('newTitle').value = '';
      document.getElementById('newContent').value = '';
    }

    // Eliminar publicación
    async function deletePost(id) {
      if(!confirm('¿Seguro que quieres eliminar esta publicación?')) return;
      const { data, error } = await supabase.from('posts').delete().eq('id', id);
      if(error) return alert('Error al eliminar: ' + error.message);
      loadPosts();
    }

    // Scroll a contenido
    function scrollToContent() {
      document.getElementById('content').scrollIntoView({ behavior: 'smooth' });
    }

    // Filtro de búsqueda
    function filterCards() {
      const filter = document.getElementById('search').value.toLowerCase();
      const cards = document.querySelectorAll('.card');
      cards.forEach(card => {
        const text = card.innerText.toLowerCase();
        card.style.display = text.includes(filter) ? 'block' : 'none';
      });
    }

    // Cargar publicaciones al inicio
    loadPosts();
  </script>

</body>
</html>
